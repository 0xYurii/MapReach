<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MapReach — Lead Tracker</title>
    <link rel="stylesheet" href="tracker.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <img class="brand-logo" src="../icons/icon48.png" alt="" width="28" height="28" />
        <div>
          <h1>MapReach</h1>
          <p class="subtitle">Lead Tracker</p>
        </div>
        <span id="lead-count" class="count-pill" aria-live="polite">0 leads</span>
      </div>
      <div class="header-actions">
        <button id="btn-export" class="btn btn-ghost" type="button">Export CSV</button>
        <button id="btn-settings" class="btn btn-ghost" type="button">Settings</button>
        <button id="btn-clear-all" class="btn btn-danger-ghost" type="button">Clear all data</button>
      </div>
    </header>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <main class="app-main">
      <section class="toolbar" aria-label="Filters and search">
        <div class="toolbar-row">
          <input id="search" class="search" type="search" placeholder="Search name, category, address, phone, website, notes…" aria-label="Search leads" />
        </div>
        <div class="toolbar-row filters">
          <label class="filter">
            <span>Status</span>
            <select id="filter-status"><option value="all">All statuses</option></select>
          </label>
          <label class="filter">
            <span>Category</span>
            <select id="filter-category"><option value="all">All categories</option></select>
          </label>
          <label class="filter">
            <span>Website</span>
            <select id="filter-website"></select>
          </label>
          <label class="filter">
            <span>Sort</span>
            <select id="sort"></select>
          </label>
          <div class="filter-meta">
            <span id="active-filters" class="active-filters"></span>
            <button id="btn-clear-filters" class="btn btn-tiny btn-ghost" type="button" hidden>Clear filters</button>
          </div>
        </div>
      </section>

      <section id="empty-state" class="empty" hidden>
        <div class="state-emoji" aria-hidden="true">📇</div>
        <h2>No leads yet</h2>
        <p>Open a business in Google Maps and save it with the MapReach side panel. Your leads will appear here.</p>
      </section>

      <section id="no-results" class="empty" hidden>
        <div class="state-emoji" aria-hidden="true">🔎</div>
        <h2>No leads match your filters</h2>
        <button id="btn-clear-filters-2" class="btn btn-primary" type="button">Clear filters</button>
      </section>

      <div class="table-wrap" id="table-wrap">
        <table class="leads-table">
          <thead>
            <tr>
              <th scope="col">Business</th>
              <th scope="col">Category</th>
              <th scope="col">Contact</th>
              <th scope="col">Website</th>
              <th scope="col">Rating</th>
              <th scope="col">Status</th>
              <th scope="col">Saved</th>
              <th scope="col">Actions</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>

    <!-- Notes editor -->
    <dialog id="dialog-notes" class="dialog">
      <form method="dialog" class="dialog-body">
        <h2 id="notes-title">Notes</h2>
        <p id="notes-subtitle" class="dialog-sub"></p>
        <textarea id="notes-text" rows="8" aria-label="Lead notes"></textarea>
        <div class="dialog-actions">
          <button value="cancel" class="btn btn-ghost" type="submit" id="notes-cancel">Cancel</button>
          <button value="save" class="btn btn-primary" type="button" id="notes-save">Save notes</button>
        </div>
      </form>
    </dialog>

    <!-- Generic confirm -->
    <dialog id="dialog-confirm" class="dialog">
      <div class="dialog-body">
        <h2 id="confirm-title">Are you sure?</h2>
        <p id="confirm-message" class="dialog-sub"></p>
        <div id="confirm-type-wrap" hidden>
          <label for="confirm-type-input">Type <strong>DELETE</strong> to confirm</label>
          <input id="confirm-type-input" type="text" autocomplete="off" />
        </div>
        <div class="dialog-actions">
          <button class="btn btn-ghost" type="button" id="confirm-cancel">Cancel</button>
          <button class="btn btn-danger" type="button" id="confirm-ok">Confirm</button>
        </div>
      </div>
    </dialog>

    <!-- Export choice -->
    <dialog id="dialog-export" class="dialog">
      <div class="dialog-body">
        <h2>Export leads to CSV</h2>
        <p class="dialog-sub" id="export-sub"></p>
        <div class="dialog-actions column">
          <button class="btn btn-primary" type="button" id="export-filtered">Export filtered leads</button>
          <button class="btn btn-ghost" type="button" id="export-all">Export all leads</button>
          <button class="btn btn-ghost" type="button" id="export-cancel">Cancel</button>
        </div>
      </div>
    </dialog>

    <script type="module" src="tracker.js"></script>
  </body>
</html>
